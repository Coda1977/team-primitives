name: ci

on:
  push:
    branches: [main]
  pull_request:

# Single job. Runs on every push and PR. Vercel can be configured to require
# the `ci / build` check before deploying — that gates pushes to production
# behind lint/typecheck/build/test passing.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
